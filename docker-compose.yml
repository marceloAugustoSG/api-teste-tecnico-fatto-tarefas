services:
  postgres:
    image: postgres:16-alpine
    container_name: lista-tarefas-postgres
    restart: unless-stopped
    shm_size: "256mb"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lista_tarefas
      TZ: America/Sao_Paulo
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lista_tarefas"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  postgres_data:
