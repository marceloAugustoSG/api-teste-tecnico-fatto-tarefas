# Perfil prod: subir com spring.profiles.active=prod (ou SPRING_PROFILES_ACTIVE=prod).
#
# CORS — só necessário se o front rodar em outro domínio/porta que a API.
# Defina origens explícitas (sem wildcard), separadas por vírgula. Exemplo:
#   CORS_ALLOWED_ORIGIN_PATTERNS=https://app.empresa.com,https://www.empresa.com
# Se deixar vazio, nenhuma regra CORS é registrada (adequado se front e API forem mesmo host / reverse proxy same-origin).
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:}
