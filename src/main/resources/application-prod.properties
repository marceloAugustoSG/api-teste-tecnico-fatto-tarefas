
# Front em outro domínio (ex.: Netlify):
#   CORS_ALLOWED_ORIGIN_PATTERNS=https://seu-app.netlify.app

server.port=${PORT:8080}
server.forward-headers-strategy=framework

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Tier free: pool pequeno (Neon também limita conexões)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:}

# Reduz tempo de boot em ambientes com pouca necessidade de docs.
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Warm-up interno para reduzir "primeira requisição lenta" em planos free.
app.warmup.enabled=true
app.warmup.initial-delay-ms=30000
app.warmup.fixed-delay-ms=300000
