spring.application.name=api-lista-tarefas

# CORS — padrão para desenvolvimento local (qualquer porta em localhost / 127.0.0.1).
# Em produção use o perfil "prod" e a variável CORS_ALLOWED_ORIGIN_PATTERNS (ver application-prod.properties).
app.cors.allowed-origin-patterns=http://localhost:*,http://127.0.0.1:*

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/lista_tarefas}
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.liquibase.change-log=classpath:liquibase/changelog/master.xml

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=America/Sao_Paulo
